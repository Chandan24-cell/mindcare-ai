services:
  - type: web
    name: stress-detection-backend
    env: python
    region: oregon
    # Use the single consolidated requirements file at repo root
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
